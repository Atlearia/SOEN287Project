    <script>
        var addAssessmentButton = document.getElementById("addAssessmentButton");
        var assessmentRows = document.getElementById("assessmentRows");
        var edited = document.getElementById("edited");

        const assessmentList = document.getElementById("assessmentList")
        const removeAssessmentButton = document.getElementById("removeAssessmentButton");

            {name: "Final", weight: 40},
            {name: "Assignment 2",weight: 5},
        ]

        function renderAssesment() {
            assessmentList.innerHTML = "";
            for(const assessment of assessments) {
                const container = document.createElement('div');
                container.innerHTML = `
                                    <div class="assessmentrow1">
                                        <div class="assessmentnamecol1">
                                            <label for="assessmentName6">Assessment Name</label>
                                            <input name="assessmentName[]" type="text" placeholder="" value="${assessment.name}">
                                        </div>
                                        <div class="assessmentweightcol1">
                                            <label for="assessmentPercent6">Weight (%)</label>
                                            <input name="assessmentPercent[]" type="number" min="0" max="100" value="${assessment.weight}">
                                        </div>
                                    </div>
                                    <br>`;
                assessmentList.appendChild(container);
            }
            
        }
        
        removeAssessmentButton.addEventListener('click', () => {
            assessments.pop();
            renderAssesment();
        })
